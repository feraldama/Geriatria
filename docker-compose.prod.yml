# Stack completo para despliegue (Postgres + API + Web).
#
# El operador del servidor administra: TLS/HTTPS (reverse proxy delante de
# `web`), respaldos de Postgres y los secretos (vía archivo .env junto a este
# compose). La aplicación NO impone esa configuración.
#
# Uso:
#   1) Definí los secretos en un .env (ver variables ${...} abajo).
#   2) docker compose -f docker-compose.prod.yml up -d --build
#   3) El primer arranque aplica migraciones. Para crear el admin inicial:
#      docker compose -f docker-compose.prod.yml exec api pnpm db:seed

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?definí POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geriatria}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-geriatria}?schema=public
      NODE_ENV: production
      PORT: 3027
      TZ: America/Asuncion
      JWT_SECRET: ${JWT_SECRET:?definí JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      # Activar Secure cuando se sirva por HTTPS (reverse proxy del operador).
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:?dominio del frontend, ej. https://geriatria.midominio.com}
      STORAGE_DIR: /data/storage
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@geriatria.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin12345}
    volumes:
      - storage:/data/storage
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      # Proxy server-side hacia la API (red interna de Docker).
      API_INTERNAL_URL: http://api:3027
    ports:
      # Punto de entrada público. El operador pone TLS por delante.
      - "${WEB_PORT:-3028}:3028"
    depends_on:
      - api

volumes:
  pgdata:
  storage:
